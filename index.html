    <link rel="icon" type="image/png" sizes="512x512" href="./roulette-icon.png" />
    <link rel="apple-touch-icon" href="./roulette-icon.png" />
    <meta name="theme-color" content="#0b1310" />

    <!-- link-sharing preview (Open Graph + Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Roulette Trainer 🎮" />
    <meta property="og:title" content="Roulette Trainer 🎮" />
    <meta
      property="og:description"
      content="A dark-theme, play-money Atlantic City roulette game and honest-stats sandbox. Bet on the felt, watch the ball rattle in — and see why no pattern beats the wheel."
    />
    <meta property="og:url" content="https://zeusnightbolt.github.io/RouletteTrainer/" />

    <meta property="og:image:width" content="512" />

      html, body, #root { margin: 0; min-height: 100%; background: #0b1310; color: #eae3d4; }
      body { min-height: 100vh; }
    </style>
  </head>
